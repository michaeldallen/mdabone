<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One-Pot Creamy Lemon Salmon Pasta - Flowchart</title>
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 960px;
      margin: 2rem auto;
      padding: 1rem;
      color: #111;
    }
    h1 {
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
    }
    p {
      margin-top: 0;
      margin-bottom: 1rem;
      font-size: 0.95rem;
      color: #333;
    }
    img {
      width: 100%;
      height: auto;
      display: block;
      border: 1px solid #ddd;
      background: #fff;
    }
    @media print {
      @page {
        size: letter portrait;
        margin: 0.5in;
      }
      body {
        margin: 0;
        padding: 0;
        max-width: 100%;
      }
      h1 {
        font-size: 14pt;
        margin-bottom: 0.25rem;
      }
      p {
        font-size: 10pt;
        margin-bottom: 0.5rem;
      }
      img {
        border: none;
        break-inside: avoid;
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <h1>Flowchart - One-Pot Creamy Lemon Salmon Pasta</h1>
  <p>Printable workflow reference.</p>
  <img src="./flowchart.svg" alt="Creamy lemon salmon pasta cooking flowchart">
</body>
</html>
